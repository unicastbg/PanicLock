name: Build and Release Debug APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: sdkmanager "platforms;android-36"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanicLock-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: PanicLock ${{ github.ref_name }}
          body: |
            ## PanicLock ${{ github.ref_name }}

            ### Installation
            1. Download `app-debug.apk` below
            2. Enable "Install from unknown sources" on your device
            3. Install the APK
            4. Grant root access when prompted

            ### Requirements
            - Rooted Android device (KernelSU or Magisk)
            - Android 8.0+
